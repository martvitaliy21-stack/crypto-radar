<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Крипто-радар — перспективные монеты</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #121722;
    --panel2: #1a2130;
    --border: #232c3f;
    --text: #e6ebf4;
    --muted: #8b96ab;
    --green: #22c07a;
    --red: #ef5561;
    --accent: #4f8ef7;
    --gold: #f2b544;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 24px 16px 60px; }
  header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 6px; }
  h1 { font-size: 26px; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  #updated { color: var(--muted); font-size: 13px; }
  .disclaimer { color: var(--muted); font-size: 12px; margin-bottom: 18px; }

  nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  nav button {
    background: var(--panel); color: var(--muted); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px;
    transition: all .15s;
  }
  nav button:hover { color: var(--text); }
  nav button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; display: flex; flex-direction: column; gap: 10px;
    transition: border-color .15s; text-decoration: none; color: inherit;
  }
  .card:hover { border-color: var(--accent); }
  .row1 { display: flex; align-items: center; gap: 10px; }
  .row1 img { width: 34px; height: 34px; border-radius: 50%; background: var(--panel2); }
  .coin-name { font-weight: 600; font-size: 15px; }
  .coin-sym { color: var(--muted); font-size: 12px; text-transform: uppercase; }
  .rank { color: var(--muted); font-size: 11px; background: var(--panel2); padding: 2px 8px; border-radius: 10px; }
  .chain { color: var(--gold); font-size: 11px; background: var(--panel2); padding: 2px 8px; border-radius: 10px; }
  .score {
    margin-left: auto; font-weight: 700; font-size: 15px; padding: 4px 11px; border-radius: 10px;
    background: var(--panel2);
  }
  .score.hi { color: var(--gold); box-shadow: inset 0 0 0 1px var(--gold); }
  .score.mid { color: var(--green); }
  .score.lo { color: var(--muted); }

  .row2 { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; font-variant-numeric: tabular-nums; }
  .price { font-size: 19px; font-weight: 700; }
  .chg { font-size: 13px; font-weight: 600; }
  .chg small { color: var(--muted); font-weight: 400; margin-right: 3px; }
  .up { color: var(--green); }
  .down { color: var(--red); }

  .row3 { display: flex; gap: 16px; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
  canvas.spark { width: 100%; height: 40px; }

  .reasons { display: flex; flex-wrap: wrap; gap: 6px; }
  .reason {
    font-size: 11.5px; color: var(--text); background: var(--panel2);
    border: 1px solid var(--border); padding: 3px 9px; border-radius: 9px;
  }
  .empty, .loading { color: var(--muted); padding: 40px 0; text-align: center; grid-column: 1/-1; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📡 Крипто-<span>радар</span></h1>
    <div id="updated">загрузка...</div>
  </header>
  <div class="disclaimer">Скор 0–100 — автоматическая оценка интереса рынка (объём, моментум, тренды). Не финансовый совет — всегда проверяй проект сам (DYOR).</div>

  <nav id="tabs">
    <button data-tab="top" class="active">⭐ Топ по скору</button>
    <button data-tab="trending">🔥 Тренды</button>
    <button data-tab="movers">🚀 Движения 24ч</button>
    <button data-tab="gems">💎 Гемы (low-cap)</button>
    <button data-tab="dex">🆕 DEX-хайп</button>
  </nav>

  <div class="grid" id="grid"><div class="loading">Загрузка данных...</div></div>
</div>

<script>
let DATA = null, TAB = 'top';

const fmtUsd = n => {
  if (n == null) return '—';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + ' млрд';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + ' млн';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
};
const fmtPrice = n => {
  if (n == null) return '—';
  if (n >= 1000) return '$' + n.toLocaleString('en-US', {maximumFractionDigits: 0});
  if (n >= 1) return '$' + n.toFixed(2);
  if (n >= 0.001) return '$' + n.toFixed(4);
  return '$' + n.toPrecision(3);
};
const chg = (v, label) => {
  if (v == null) return '';
  const cls = v >= 0 ? 'up' : 'down';
  const sign = v >= 0 ? '+' : '';
  return `<span class="chg ${cls}"><small>${label}</small>${sign}${v.toFixed(1)}%</span>`;
};

function card(c) {
  const scoreCls = c.score >= 60 ? 'hi' : c.score >= 35 ? 'mid' : 'lo';
  return `<a class="card" href="${c.url || '#'}" target="_blank" rel="noopener">
    <div class="row1">
      ${c.image ? `<img src="${c.image}" alt="" loading="lazy">` : ''}
      <div>
        <div class="coin-name">${c.name || c.symbol}</div>
        <div class="coin-sym">${c.symbol || ''}</div>
      </div>
      ${c.rank ? `<span class="rank">#${c.rank}</span>` : ''}
      ${c.chain ? `<span class="chain">${c.chain}</span>` : ''}
      ${c.score != null ? `<span class="score ${scoreCls}">${c.score}</span>` : ''}
    </div>
    <div class="row2">
      <span class="price">${fmtPrice(c.price)}</span>
      ${chg(c.ch1h, '1ч')} ${chg(c.ch24h, '24ч')} ${chg(c.ch7d, '7д')}
    </div>
    <div class="row3">
      <span>Кап: ${fmtUsd(c.mcap)}</span>
      <span>Объём 24ч: ${fmtUsd(c.volume)}</span>
      ${c.liquidity ? `<span>Ликв: ${fmtUsd(c.liquidity)}</span>` : ''}
    </div>
    ${c.spark && c.spark.length > 5 ? `<canvas class="spark" data-spark="${c.spark.map(v => +v.toPrecision(5)).join(',')}"></canvas>` : ''}
    ${c.reasons && c.reasons.length ? `<div class="reasons">${c.reasons.map(r => `<span class="reason">${r}</span>`).join('')}</div>` : ''}
  </a>`;
}

function drawSparks() {
  document.querySelectorAll('canvas.spark').forEach(cv => {
    const pts = cv.dataset.spark.split(',').map(Number);
    const w = cv.offsetWidth || 300, h = 40, dpr = devicePixelRatio || 1;
    cv.width = w * dpr; cv.height = h * dpr;
    const ctx = cv.getContext('2d'); ctx.scale(dpr, dpr);
    const min = Math.min(...pts), max = Math.max(...pts), span = (max - min) || 1;
    const up = pts[pts.length - 1] >= pts[0];
    ctx.strokeStyle = up ? '#22c07a' : '#ef5561';
    ctx.lineWidth = 1.5; ctx.beginPath();
    pts.forEach((p, i) => {
      const x = i / (pts.length - 1) * w;
      const y = h - 3 - (p - min) / span * (h - 6);
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    });
    ctx.stroke();
  });
}

function render() {
  const grid = document.getElementById('grid');
  const items = (DATA && DATA[TAB]) || [];
  grid.innerHTML = items.length ? items.map(card).join('') : '<div class="empty">Пока пусто — данные появятся после следующего обновления</div>';
  drawSparks();
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('button'); if (!btn) return;
  TAB = btn.dataset.tab;
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

fetch('data.json?t=' + Date.now())
  .then(r => r.json())
  .then(d => {
    DATA = d;
    const dt = new Date(d.updated);
    document.getElementById('updated').textContent =
      'Обновлено: ' + dt.toLocaleString('ru-RU', {day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'});
    render();
  })
  .catch(() => {
    document.getElementById('grid').innerHTML = '<div class="empty">Не удалось загрузить data.json — запусти scanner.py</div>';
  });
</script>
</body>
</html>
