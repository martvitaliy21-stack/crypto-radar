name: Крипто-сканер (каждый час)

on:
  schedule:
    - cron: "5 * * * *"   # каждый час в :05
  workflow_dispatch:        # можно запустить вручную во вкладке Actions

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Запуск сканера
        run: python3 scanner.py

      - name: Коммит обновлённых данных
        run: |
          git config user.name "crypto-scanner-bot"
          git config user.email "actions@github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
